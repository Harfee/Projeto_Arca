<main class="login-container">
    <div class="login-header">

    </div>

    <div class="toggle-buttons">
        <button class="btn-toggle active">Cidadão</button>
        <button class="btn-toggle">ONG / Clínica Veterinária</button>
    </div>


    <div class="login-box">
        <h4>LOGIN CIDADÃO</h4>

        <form>
            <div class="input-group">
                <label>CPF:</label>
                <input type="text" maxlength="11" placeholder="Informe apenas números">
            </div>

            <div class="input-group">
                <label>Senha:</label>
                <input type="password" placeholder="Digite sua senha">
                <a href="#" class="forgot-password">Esqueci minha senha</a>
            </div>

            <div class="input-group">
                <label>Data de nascimento:</label>
                <input type="text" maxlength="8" placeholder="00/00/0000">
            </div>

            <button type="submit" class="btn-continue">Continuar</button>
        </form>
    </div>
